<!DOCTYPE html>
<html lang="pt-br">

<head>
    <title>Igreja em Realidade Aumentada</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
    <style>
        body {
            margin: 0;
            background-color: #121212;
            color: white;
            font-family: sans-serif;
        }

        model-viewer {
            width: 100%;
            height: 80vh;
            --poster-color: transparent;
        }

        #ar-button {
            background-color: #ffffff;
            border-radius: 30px;
            border: none;
            position: absolute;
            bottom: 50px;
            left: 50%;
            transform: translateX(-50%);
            padding: 15px 30px;
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
            cursor: pointer;
            z-index: 999;
        }

        .instrucoes {
            position: absolute;
            top: 20px;
            width: 100%;
            text-align: center;
            text-shadow: 1px 1px 2px black;
        }
    </style>
</head>

<body>

    <div class="instrucoes">
        <h2>Outdoor Digital</h2>
        <p>Clique no botão abaixo para projetar o anúncio</p>
    </div>

    <model-viewer src="billboard.glb" ar ar-modes="webxr scene-viewer quick-look" camera-controls ar-placement="floor"
        shadow-intensity="1" camera-orbit="0deg 75deg 105%" field-of-view="30deg" alt="Outdoor da Igreja">

        <button slot="ar-button" id="ar-button">
            ✨ VER NO MEU ESPAÇO
        </button>

    </model-viewer>

</body>

</html>
