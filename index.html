<!DOCTYPE html>
<html lang="pt-br">

<head>
    <title>Igreja em Realidade Aumentada</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
    <style>
        body {
            margin: 0;
            background-color: #121212;
            color: white;
            font-family: sans-serif;
        }

        model-viewer {
            width: 100%;
            height: 80vh;
            --poster-color: transparent;
        }

        #ar-button {
            background-color: #ffffff;
            border-radius: 30px;
            border: none;
            position: absolute;
            bottom: 50px;
            left: 50%;
            transform: translateX(-50%);
            padding: 15px 30px;
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
            cursor: pointer;
            z-index: 1010;
        }

        .instrucoes {
            position: absolute;
            top: 20px;
            width: 100%;
            text-align: center;
            text-shadow: 1px 1px 2px black;
        }

        .controls {
            position: absolute;
            bottom: 140px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 10px;
            z-index: 1000;
        }

        .control-btn {
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            padding: 10px 20px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s ease;
        }

        .control-btn.active {
            background: white;
            color: #121212;
            font-weight: bold;
            box-shadow: 0 4px 10px rgba(255, 255, 255, 0.3);
        }
    </style>
</head>

<body>

    <div class="instrucoes">
        <h2>Outdoor Digital</h2>
        <p>Escolha o tamanho e projete o anúncio</p>
    </div>

    <div class="controls">
        <button class="control-btn active" onclick="changeScale('1 1 1', this)">Tamanho Real</button>
        <button class="control-btn" onclick="changeScale('0.3 0.3 0.3', this)">Miniatura</button>
    </div>

    <model-viewer src="billboard.glb" ar ar-modes="webxr scene-viewer quick-look" camera-controls ar-placement="floor"
        shadow-intensity="1" camera-orbit="0deg 75deg 105%" field-of-view="30deg" alt="Outdoor da Igreja">

        <button slot="ar-button" id="ar-button">
            ✨ VER NO MEU ESPAÇO
        </button>

    </model-viewer>

    <script>
        function changeScale(scale, element) {
            const mv = document.querySelector('model-viewer');
            mv.scale = scale;

            // Update active state of buttons
            document.querySelectorAll('.control-btn').forEach(btn => btn.classList.remove('active'));
            element.classList.add('active');
        }
    </script>

</body>

</html>
